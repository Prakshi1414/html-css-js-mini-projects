<!DOCTYPE html>
<html>
<head>
	<title>Slide Navbar</title>
	<link rel="stylesheet" type="text/css" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet">
</head>
<body>
	<div class="main">  	
		<input type="checkbox" id="chk" aria-hidden="true">
			<div class="signup">
				<form id="signup-form">
					<label for="chk" aria-hidden="true">Sign up</label>
					<input id="reg-uname" type="text" name="txt" placeholder="User name" required="">
					<input id="reg-email" type="email" name="email" placeholder="Email" required="">
					<input id="reg-pass" type="password" name="pswd" placeholder="Password" required="">
					<button type="submite" id="signup-button">Sign up</button>
				</form>
			</div>

			<div class="login">
				<form id="login-form">
					<label for="chk" aria-hidden="true">Login</label>
					<input id="log-uname" type="username" name="username" placeholder="User Name" required="">
					<input id="log-pass" type="password" name="pswd" placeholder="Password" required="">
					<button type="submit" id="login-button">Login</button>
				</form>
			</div>
			
	</div>
    <script src="login.js"></script>
</body>
</html>
