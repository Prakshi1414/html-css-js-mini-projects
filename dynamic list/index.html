<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Generator</title>
  <style>
    body {
    background: #f2f2f2;
    font-family: Arial, sans-serif;
        }

        .container {
            width: 450px;
            margin: 100px auto;
            padding: 30px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .tag-area {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: #e0e7ff;
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .tag span {
            background: #4f46e5;
            color: white;
            padding: 2px 8px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

  </style>
</head>
<body>

    <div class="container">
        <h1>Tag Generator</h1>

        <div class="input-box">
            <input type="text" id="tagInput" placeholder="Enter a tag...">
            <button id="addTag">Add</button>
        </div>

        <div class="tag-area" id="tagArea"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
